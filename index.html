<!DOCTYPE html>
<html>
    <head>
        <title>SteamSelector</title>
        <link rel="stylesheet" type="text/css" href="styles.css">
        <link rel="icon" type="image/png" href="assets/icon.png">
    </head>
    <body>
        <div class="header">
            <img src="assets/icon.png" alt="SteamSelector Icon" width="50" height="50" style="margin-right: 15px;">
            <h1 style="font-family:'Courier New', Courier, monospace">SteamSelector</h1>
        </div>
        <div class="steamprofileinput">
            <form>
                <h2>Insert a Steam profile link or Steam profile ID.</h2>
                <input type="text" id="steamInput" placeholder="e.g., https://steamcommunity.com/id/username or 76561198000000000" style="width: 600px; height: 30px; font-size: 16px; margin-top: 10px;">
            </form>
        </div>
    </body>
</html>
